<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViasAte</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 font-sans p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800">⚙️ Admin ViasAte</h1>
      <button onclick="window.location='/login.html'" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm">Cerrar sesión</button>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-white p-4 rounded-xl shadow"><span class="text-slate-500 text-xs">Total</span><div id="totalCount" class="text-2xl font-bold">0</div></div>
      <div class="bg-white p-4 rounded-xl shadow"><span class="text-slate-500 text-xs">En espera</span><div id="esperaCount" class="text-2xl font-bold text-amber-600">0</div></div>
      <div class="bg-white p-4 rounded-xl shadow"><span class="text-slate-500 text-xs">En proceso</span><div id="procesoCount" class="text-2xl font-bold text-blue-600">0</div></div>
      <div class="bg-white p-4 rounded-xl shadow"><span class="text-slate-500 text-xs">Terminados</span><div id="terminadoCount" class="text-2xl font-bold text-green-600">0</div></div>
    </div>
    <div class="flex gap-4 mb-4">
      <select id="filtroEstado" class="bg-white border rounded-lg px-4 py-2 text-sm">
        <option value="todos">Todos</option>
        <option value="En espera">En espera</option>
        <option value="En proceso">En proceso</option>
        <option value="Terminado">Terminado</option>
      </select>
      <input type="text" id="search" placeholder="Buscar título..." class="bg-white border rounded-lg px-4 py-2 text-sm flex-1">
      <button id="exportCsv" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm">Exportar CSV</button>
    </div>
    <div class="bg-white rounded-xl shadow overflow-x-auto max-h-96">
      <table class="w-full text-sm text-left">
        <thead class="bg-slate-50 text-slate-600 uppercase sticky top-0">
          <tr><th class="px-4 py-3">Código</th><th class="px-4 py-3">Título</th><th class="px-4 py-3">Categoría</th><th class="px-4 py-3">Estado</th><th class="px-4 py-3">Fecha</th><th class="px-4 py-3">Acciones</th></tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>
    <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded-xl shadow"><canvas id="chartCategorias"></canvas></div>
      <div class="bg-white p-6 rounded-xl shadow"><canvas id="chartEstados"></canvas></div>
    </div>
  </div>

  <!-- Modal de detalle -->
  <div id="detailModal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 m-4">
      <div class="flex justify-between items-start mb-4">
        <h2 class="text-xl font-bold text-slate-800" id="modalTitulo"></h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-800"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>
      <div id="modalContenido"></div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const token = localStorage.getItem('token');
    if (!token) window.location = '/login.html';

    let allData = [];
    async function fetchData() {
      const res = await fetch('/api/admin/quejas', { headers: { Authorization: `Bearer ${token}` } });
      allData = await res.json();
      renderTable();
      updateStats();
      renderCharts();
    }

    function renderTable() {
      const filtro = document.getElementById('filtroEstado').value;
      const search = document.getElementById('search').value.toLowerCase();
      const filtered = allData.filter(q => (filtro === 'todos' || q.estado === filtro) && q.titulo.toLowerCase().includes(search));
      const tbody = document.getElementById('tablaBody');
      tbody.innerHTML = filtered.map(q => `
        <tr class="border-t hover:bg-slate-50">
          <td class="px-4 py-3 font-mono">${q.codigo}</td>
          <td class="px-4 py-3">${q.titulo}</td>
          <td class="px-4 py-3">${q.categoria}</td>
          <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ${q.estado==='Terminado'?'bg-green-100 text-green-700':q.estado==='En proceso'?'bg-blue-100 text-blue-700':'bg-amber-100 text-amber-700'}">${q.estado}</span></td>
          <td class="px-4 py-3 text-xs">${new Date(q.fecha).toLocaleString()}</td>
          <td class="px-4 py-3 flex gap-1">
            <button class="text-xs bg-slate-200 rounded px-2 py-1 verDetalle" data-id="${q._id}"><i data-lucide="eye" class="w-3 h-3 inline"></i> Ver</button>
            <button class="text-xs bg-yellow-100 rounded px-2 py-1 comentarioBtn" data-id="${q._id}">💬</button>
            <button class="text-xs bg-red-100 text-red-700 rounded px-2 py-1 eliminarBtn" data-id="${q._id}"><i data-lucide="trash-2" class="w-3 h-3 inline"></i> Eliminar</button>
          </td>
        </tr>`).join('');

      document.querySelectorAll('.verDetalle').forEach(btn => {
        btn.addEventListener('click', () => {
          const q = allData.find(i => i._id == btn.dataset.id);
          openModal(q);
        });
      });

      document.querySelectorAll('.comentarioBtn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const texto = prompt('Añadir comentario interno:');
          if (!texto) return;
          await fetch(`/api/quejas/${id}/comentarios`, {
            method: 'POST', headers: { 'Content-Type':'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ texto })
          });
          alert('Comentario agregado');
        });
      });

      document.querySelectorAll('.eliminarBtn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          if (confirm('¿Estás seguro de que deseas eliminar este registro? Esta acción no se puede deshacer.')) {
            await fetch(`/api/quejas/${id}`, {
              method: 'DELETE',
              headers: { Authorization: `Bearer ${token}` }
            });
            alert('Registro eliminado correctamente');
            fetchData();
          }
        });
      });
      lucide.createIcons();
    }

    function openModal(q) {
      document.getElementById('modalTitulo').textContent = `Reporte #${q.codigo}`;
      const fotosHtml = q.fotos && q.fotos.length > 0 
        ? `<div class="flex gap-2 flex-wrap">${q.fotos.map(f => `<img src="${f}" class="h-24 w-24 object-cover rounded border">`).join('')}</div>` 
        : '<p class="text-xs text-slate-400">Sin imágenes</p>';
      const historialHtml = q.historial.map(h => `<li class="text-xs text-slate-600">• ${h.estado} - ${new Date(h.fecha).toLocaleString()}</li>`).join('');
      const comentariosInternosHtml = q.comentarios && q.comentarios.length > 0 
        ? q.comentarios.map(c => `<div class="text-xs text-slate-600 border-l-2 border-slate-300 pl-2 mb-1"><strong>${c.autor}</strong> (${new Date(c.fecha).toLocaleString()}): ${c.texto}</div>`).join('')
        : '<p class="text-xs text-slate-400">Sin comentarios internos</p>';
      const comentariosPublicosHtml = q.comentarios_publicos && q.comentarios_publicos.length > 0 
        ? q.comentarios_publicos.map(c => `<div class="text-xs text-slate-600 border-l-2 border-slate-300 pl-2 mb-1"><strong>${c.autor}</strong> (${new Date(c.fecha).toLocaleString()}): ${c.texto}</div>`).join('')
        : '<p class="text-xs text-slate-400">Sin comentarios públicos</p>';

      document.getElementById('modalContenido').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <p class="text-sm font-semibold text-slate-700">Título</p>
            <p class="text-sm text-slate-600">${q.titulo}</p>
            <p class="text-sm font-semibold text-slate-700 mt-2">Categoría</p>
            <p class="text-sm text-slate-600">${q.categoria}</p>
            <p class="text-sm font-semibold text-slate-700 mt-2">Estado actual</p>
            <select id="estadoModal" class="mt-1 border rounded px-2 py-1 text-sm">
              <option ${q.estado==='En espera'?'selected':''}>En espera</option>
              <option ${q.estado==='En proceso'?'selected':''}>En proceso</option>
              <option ${q.estado==='Terminado'?'selected':''}>Terminado</option>
            </select>
            <button onclick="cambiarEstadoModal('${q._id}')" class="ml-2 bg-slate-800 text-white px-3 py-1 rounded text-xs">Actualizar</button>
          </div>
          <div>
            <p class="text-sm font-semibold text-slate-700">Descripción</p>
            <p class="text-sm text-slate-600">${q.descripcion}</p>
            <p class="text-sm font-semibold text-slate-700 mt-2">Fotos</p>
            ${fotosHtml}
          </div>
        </div>
        <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <p class="text-sm font-semibold text-slate-700">Historial de estados</p>
            <ul class="list-none">${historialHtml}</ul>
          </div>
          <div>
            <p class="text-sm font-semibold text-slate-700">Comentarios internos</p>
            ${comentariosInternosHtml}
            <button onclick="agregarComentarioModal('${q._id}')" class="text-xs bg-slate-200 rounded px-2 py-1 mt-2">+ Agregar comentario interno</button>
            <p class="text-sm font-semibold text-slate-700 mt-4">Comentarios públicos</p>
            ${comentariosPublicosHtml}
          </div>
        </div>
      `;
      document.getElementById('detailModal').classList.remove('hidden');
    }

    window.closeModal = function() {
      document.getElementById('detailModal').classList.add('hidden');
    };

    window.cambiarEstadoModal = async function(id) {
      const nuevoEstado = document.getElementById('estadoModal').value;
      await fetch(`/api/quejas/${id}/estado`, {
        method: 'PATCH',
        headers: { 'Content-Type':'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ nuevoEstado })
      });
      fetchData();
      closeModal();
    };

    window.agregarComentarioModal = async function(id) {
      const texto = prompt('Comentario:');
      if (!texto) return;
      await fetch(`/api/quejas/${id}/comentarios`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ texto })
      });
      fetchData();
      // Refrescar el modal con los nuevos datos
      const q = allData.find(i => i._id == id);
      if (q) openModal(q);
    };

    function updateStats() {
      document.getElementById('totalCount').textContent = allData.length;
      document.getElementById('esperaCount').textContent = allData.filter(q=>q.estado==='En espera').length;
      document.getElementById('procesoCount').textContent = allData.filter(q=>q.estado==='En proceso').length;
      document.getElementById('terminadoCount').textContent = allData.filter(q=>q.estado==='Terminado').length;
    }

    let charts = {};
    function renderCharts() {
      const cats = {};
      allData.forEach(q => cats[q.categoria] = (cats[q.categoria]||0)+1);
      if (charts.cat) charts.cat.destroy();
      charts.cat = new Chart(document.getElementById('chartCategorias'), { type:'doughnut', data:{ labels:Object.keys(cats), datasets:[{ data:Object.values(cats) }] } });

      const est = { 'En espera':0,'En proceso':0,'Terminado':0 };
      allData.forEach(q => est[q.estado]++);
      if (charts.est) charts.est.destroy();
      charts.est = new Chart(document.getElementById('chartEstados'), { type:'bar', data:{ labels:Object.keys(est), datasets:[{ data:Object.values(est), backgroundColor:['#f59e0b','#3b82f6','#10b981'] }] } });
    }

    document.getElementById('filtroEstado').addEventListener('change', renderTable);
    document.getElementById('search').addEventListener('input', renderTable);
    document.getElementById('exportCsv').addEventListener('click', () => {
      window.open(`/api/export/csv?token=${token}`, '_blank');
    });

    fetchData();
  </script>
</body>
</html>
